<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Text with AI</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --system-bubble: #E9E8ED;
            --system-text: #1a1a1a;
            --user-bubble-start: #4f95ff;
            --user-bubble-end: #3B86F6;
            --user-text: #ffffff;
            --guide-color: #a0a0a0;
            --vh: 1vh;
        }

        /* 전체 스크롤을 막고 내부 스크롤만 허용 */
        html, body { 
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            background: var(--bg-color);
        }

        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: calc(var(--vh, 1vh) * 100); 
        }
        
        /* 시작 모달 영역 */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8f9fa; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; gap: 20px; }
        #start-msg { font-size: 20px; font-weight: 600; color: #333; margin: 0; }
        #start-btn { padding: 15px 40px; background: var(--user-bubble-end); color: #fff; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.06); }
        
        #version-tag { position: absolute; bottom: 20px; font-size: 12px; color: #999; font-family: monospace; }

        /* 채팅 창 영역: 하단 고정 바 높이만큼 padding-bottom 확보 및 유연한 크기 축소(flex: 1) */
        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px 15px 140px 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            -webkit-overflow-scrolling: touch; 
            box-sizing: border-box;
        }

        /* 말풍선 공통 스타일 */
        .message { max-width: 80%; padding: 11px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.45; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.03); word-break: break-all; }
        
        /* 시스템: 왼쪽 */
        .system { align-self: flex-start; background: var(--system-bubble); color: var(--system-text); border-bottom-left-radius: 2px; }

        /* 사용자: 오른쪽 */
        .user { align-self: flex-end; background: linear-gradient(135deg, var(--user-bubble-start), var(--user-bubble-end)); color: var(--user-text); border-bottom-right-radius: 2px; }

        /* 하단 입력 영역: 상단 경계선 및 여백 고정 */
        .bottom-container { 
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #fff; 
            border-top: 1px solid #eaeaea; 
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom)) 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            box-sizing: border-box; 
            z-index: 5;
        }
        
        #guide-label { font-size: 13px; color: var(--guide-color); font-weight: 500; min-height: 18px; padding-left: 4px; }

        .input-area { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; outline: none; font-size: 16px; background: #fafafa; -webkit-appearance: none; }
        input:focus { border-color: var(--user-bubble-end); background: #fff; }
        
        button.send-btn { padding: 0 20px; background: var(--user-bubble-end); color: #fff; border: none; border-radius: 8px; font-size: 14.5px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        button.send-btn:disabled { background: #e0e0e0; color: #a0a0a0; }

        /* 에러 메시지 */
        #error-msg { color: #ff3b30; font-size: 12px; margin: 0; display: none; padding-left: 4px; }
    </style>
</head>
<body>

<div id="start-overlay">
    <p id="start-msg">AI와 대화를 나누어보세요.</p>
    <button id="start-btn">대화 시작</button>
    <div id="version-tag">v0.1.6</div>
</div>

<div id="chat-window">
    </div>

<div class="bottom-container">
    <div id="guide-label">대화 시작 버튼을 눌러주세요.</div>
    <div id="error-msg">안내된 문구와 일치하지 않습니다. 다시 입력해주세요.</div>
    
    <div class="input-area">
        <input type="text" id="user-input" autocomplete="off" disabled placeholder="텍스트를 입력하세요.">
        <button id="send-btn" class="send-btn" disabled>전송</button>
    </div>
</div>

<script>
    const APP_VERSION = "0.1.6"; // 스크롤 보정 버전 업

    const scenario = [
        { guide: "안녕하세요", response: "안녕하세요! 실험에 참여해주셔서 감사합니다.", systemFirst: "안녕하세요, 대화를 시작합니다. 아래 안내에 따라 답장을 입력해주세요." },
        { guide: "실험 절차를 알려주세요", response: "안내되는 문구를 그대로 입력하시면 대화가 진행됩니다." },
        { guide: "알겠습니다", response: "좋습니다. 이제 다음 단계로 넘어갑니다." },
        { guide: "종료", response: "모든 대화가 완료되었습니다. 창을 닫아주세요." }
    ];

    let currentTurn = 0;

    const startOverlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const versionTag = document.getElementById('version-tag');
    const chatWindow = document.getElementById('chat-window');
    const inputField = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const errorMsg = document.getElementById('error-msg');
    const guideLabel = document.getElementById('guide-label');

    versionTag.innerText = `v${APP_VERSION}`;

    // 스크롤 최하단 이동 함수 최적화
    function scrollToBottom() {
        setTimeout(() => {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }, 80);
    }

    function setScreenSize() {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
        scrollToBottom(); // 화면 크기 변경 시 스크롤 동기화
    }
    
    window.addEventListener('resize', setScreenSize);
    window.addEventListener('orientationchange', setScreenSize);
    setScreenSize();

    function startExperiment() {
        startOverlay.style.display = 'none';
        inputField.disabled = false;
        sendBtn.disabled = false;
        
        setTimeout(() => {
            appendMessage(scenario[0].systemFirst, 'system');
            updateGuide();
        }, 300);
    }

    function updateGuide() {
        if (currentTurn < scenario.length) {
            guideLabel.innerText = `작성 가이드: "${scenario[currentTurn].guide}"`;
            inputField.value = "";
            inputField.focus(); 
            scrollToBottom();
        } else {
            guideLabel.innerText = "대화가 종료되었습니다.";
            inputField.placeholder = "대화 종료";
            inputField.disabled = true;
            sendBtn.disabled = true;
        }
    }

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        scrollToBottom();
    }

    function handleSend() {
        const userInput = inputField.value.trim();
        const target = scenario[currentTurn].guide;

        if (userInput !== target) {
            errorMsg.style.display = 'block';
            inputField.style.borderColor = '#ff3b30';
            scrollToBottom();
            return;
        }

        errorMsg.style.display = 'none';
        inputField.style.borderColor = '#e0e0e0';
        
        appendMessage(userInput, 'user');

        setTimeout(() => {
            appendMessage(scenario[currentTurn].response, 'system');
            currentTurn++;
            updateGuide();
        }, 500);
    }

    startBtn.addEventListener('click', startExperiment);
    sendBtn.addEventListener('click', handleSend);
    inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter' && !inputField.disabled) handleSend(); });
    
    // 모바일 키보드 활성화 시 강제 스크롤 제어
    inputField.addEventListener('focus', scrollToBottom);
</script>

</body>
</html>
