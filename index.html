<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Text with AI</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --system-bubble: #E9E8ED;
            --system-text: #1a1a1a;
            --user-bubble-start: #4f95ff;
            --user-bubble-end: #3B86F6;
            --user-text: #ffffff;
            --guide-color: #a0a0a0;
        }

        html, body { 
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            font-family: -apple-system, sans-serif; 
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }
        
        /* 시작 모달 영역 */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8f9fa; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; gap: 20px; }
        #start-msg { font-size: 20px; font-weight: 600; color: #333; margin: 0; }
        #start-btn { padding: 15px 40px; background: var(--user-bubble-end); color: #fff; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.06); }
        
        #version-tag { position: absolute; bottom: 20px; font-size: 12px; color: #999; font-family: monospace; }

        /* [추가] 상단 고정 헤더 영역 (프로필 아이콘, 소개 문구) */
        .top-header {
            background: #fff;
            border-bottom: 1px solid #eaeaea;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            width: 100%;
        }

        /* SVG 사람 프로필 아이콘 */
        .profile-icon {
            width: 54px;
            height: 54px;
            background: #e1e4e8;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }
        .profile-icon svg {
            width: 32px;
            height: 32px;
            fill: #959da5;
        }

        .intro-text {
            font-size: 13.5px;
            color: #555;
            line-height: 1.5;
            margin: 0;
            font-weight: 400;
            word-break: keep-all;
        }

        /* 채팅 창 영역 */
        #chat-window { 
            flex: 1; 
            overflow-y: auto;
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            -webkit-overflow-scrolling: touch; 
            box-sizing: border-box;
        }

        /* 말풍선 공통 스타일: 가로 기준 2/3 제한 */
        .message { max-width: 66.6%; padding: 11px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.45; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.03); word-break: break-all; }
        
        /* 시스템: 왼쪽 */
        .system { align-self: flex-start; background: var(--system-bubble); color: var(--system-text); border-bottom-left-radius: 2px; }

        /* 사용자: 오른쪽 */
        .user { align-self: flex-end; background: linear-gradient(135deg, var(--user-bubble-start), var(--user-bubble-end)); color: var(--user-text); border-bottom-right-radius: 2px; }

        /* 하단 입력 영역 */
        .bottom-container { 
            background: #fff; 
            border-top: 1px solid #eaeaea; 
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom)) 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            box-sizing: border-box; 
            width: 100%;
        }
        
        #guide-label { font-size: 13px; color: var(--guide-color); font-weight: 500; min-height: 18px; padding-left: 4px; }

        .input-area { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; outline: none; font-size: 16px; background: #fafafa; -webkit-appearance: none; }
        input:focus { border-color: var(--user-bubble-end); background: #fff; }
        
        button.send-btn { padding: 0 20px; background: var(--user-bubble-end); color: #fff; border: none; border-radius: 8px; font-size: 14.5px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        button.send-btn:disabled { background: #e0e0e0; color: #a0a0a0; }

        /* 에러 메시지 */
        #error-msg { color: #ff3b30; font-size: 12px; margin: 0; display: none; padding-left: 4px; }
    </style>
</head>
<body>

<div id="start-overlay">
    <p id="start-msg">AI와 대화를 나누어보세요.</p>
    <button id="start-btn">대화 시작</button>
    <div id="version-tag">v0.2.2</div>
</div>

<div class="app-container">
    <div class="top-header">
        <div class="profile-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z"/>
            </svg>
        </div>
        <p class="intro-text">본 대화는 인공지능 시스템의 반응성 측정을 위한 실험 시나리오입니다.<br>하단 가이드라인 문구를 확인하신 후 정확하게 입력해 주세요.</p>
    </div>

    <div id="chat-window"></div>

    <div class="bottom-container" id="bottom-bar">
        <div id="guide-label">대화 시작 버튼을 눌러주세요.</div>
        <div id="error-msg">안내된 문구와 일치하지 않습니다. 다시 입력해주세요.</div>
        
        <div class="input-area">
            <input type="text" id="user-input" autocomplete="off" disabled placeholder="텍스트를 입력하세요.">
            <button id="send-btn" class="send-btn" disabled>전송</button>
        </div>
    </div>
</div>

<script>
    const APP_VERSION = "0.2.2";

    const scenario = [
        { guide: "안녕하세요", response: "안녕하세요! 실험에 참여해주셔서 감사합니다.", systemFirst: "안녕하세요, 대화를 시작합니다. 아래 안내에 따라 답장을 입력해주세요." },
        { guide: "실험 절차를 알려주세요", response: "안내되는 문구를 그대로 입력하시면 대화가 진행됩니다." },
        { guide: "알겠습니다", response: "좋습니다. 이제 다음 단계로 넘어갑니다." },
        { guide: "종료", response: "모든 대화가 완료되었습니다. 창을 닫아주세요." }
    ];

    let currentTurn = 0;

    const startOverlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const versionTag = document.getElementById('version-tag');
    const chatWindow = document.getElementById('chat-window');
    const inputField = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const errorMsg = document.getElementById('error-msg');
    const guideLabel = document.getElementById('guide-label');

    versionTag.innerText = `v${APP_VERSION}`;

    // [핵심 보정] 마지막 말풍선 객체를 타겟팅하여 스크롤 뷰 안으로 확실히 밀어 넣는 네이티브 엔진
    function scrollTargetIntoView() {
        setTimeout(() => {
            const lastMessage = chatWindow.lastElementChild;
            if (lastMessage) {
                lastMessage.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
        }, 100);
    }

    function startExperiment() {
        startOverlay.style.display = 'none';
        inputField.disabled = false;
        sendBtn.disabled = false;
        
        setTimeout(() => {
            appendMessage(scenario[0].systemFirst, 'system');
            updateGuide();
        }, 300);
    }

    function updateGuide() {
        if (currentTurn < scenario.length) {
            guideLabel.innerText = `작성 가이드: "${scenario[currentTurn].guide}"`;
            inputField.value = "";
            inputField.focus(); 
            scrollTargetIntoView();
        } else {
            guideLabel.innerText = "대화가 종료되었습니다.";
            inputField.placeholder = "대화 종료";
            inputField.disabled = true;
            sendBtn.disabled = true;
        }
    }

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        scrollTargetIntoView();
    }

    function handleSend() {
        const userInput = inputField.value.trim();
        const target = scenario[currentTurn].guide;

        if (userInput !== target) {
            errorMsg.style.display = 'block';
            inputField.style.borderColor = '#ff3b30';
            scrollTargetIntoView();
            return;
        }

        errorMsg.style.display = 'none';
        inputField.style.borderColor = '#e0e0e0';
        
        appendMessage(userInput, 'user');

        setTimeout(() => {
            appendMessage(scenario[currentTurn].response, 'system');
            currentTurn++;
            updateGuide();
        }, 500);
    }

    startBtn.addEventListener('click', startExperiment);
    sendBtn.addEventListener('click', handleSend);
    inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter' && !inputField.disabled) handleSend(); });
    
    // 포커스 시 키보드가 올라오는 타이밍에 정확히 마지막 말풍선을 뷰포트 내로 인장
    inputField.addEventListener('focus', scrollTargetIntoView);
</script>

</body>
</html>
