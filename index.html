<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Experiment</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --system-bubble: #ffffff;
            --user-bubble: #007aff;
            --user-text: #ffffff;
            --guide-color: #999;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* 시작 모달 영역 */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(240, 242, 245, 0.95); display: flex; justify-content: center; align-items: center; z-index: 10; }
        #start-btn { padding: 15px 40px; background: var(--user-bubble); color: #fff; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #start-btn:hover { background: #0063cc; }

        /* 채팅 창 영역 */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

        /* 말풍선 공통 스타일 */
        .message { max-width: 70%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; }
        
        /* 시스템: 왼쪽 */
        .system { align-self: flex-start; background: var(--system-bubble); border: 1px solid #ddd; border-bottom-left-radius: 2px; }

        /* 사용자: 오른쪽 */
        .user { align-self: flex-end; background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius: 2px; }

        /* 하단 입력 영역 */
        .input-area { background: #fff; padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; font-size: 14px; }
        input::placeholder { color: var(--guide-color); }
        
        button.send-btn { padding: 0 20px; background: var(--user-bubble); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        button.send-btn:disabled { background: #ccc; cursor: default; }

        /* 에러 메시지 */
        #error-msg { color: #ff3b30; font-size: 12px; margin-top: 5px; display: none; padding-left: 20px; padding-bottom: 10px; }
    </style>
</head>
<body>

<div id="start-overlay">
    <button id="start-btn">실험 시작</button>
</div>

<div id="chat-window">
    </div>

<div id="error-msg">안내된 문구와 일치하지 않습니다. 다시 입력해주세요.</div>

<div class="input-area">
    <input type="text" id="user-input" autocomplete="off" disabled placeholder="실험 시작 버튼을 눌러주세요.">
    <button id="send-btn" class="send-btn" disabled>전송</button>
</div>

<script>
    // 1. 실험 시나리오 설정
    const scenario = [
        { guide: "안녕하세요", response: "안녕하세요! 실험에 참여해주셔서 감사합니다." },
        { guide: "실험 절차를 알려주세요", response: "안내되는 문구를 그대로 입력하시면 대화가 진행됩니다." },
        { guide: "알겠습니다", response: "좋습니다. 이제 다음 단계로 넘어갑니다." },
        { guide: "종료", response: "모든 대화가 완료되었습니다. 창을 닫아주세요." }
    ];

    let currentTurn = 0;

    const startOverlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const chatWindow = document.getElementById('chat-window');
    const inputField = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const errorMsg = document.getElementById('error-msg');

    // 실험 시작 처리
    function startExperiment() {
        startOverlay.style.display = 'none'; // 시작 화면 숨김
        inputField.disabled = false;
        sendBtn.disabled = false;
        updateGuide(); // 첫 번째 가이드 활성화
    }

    // 가이드 텍스트 설정
    function updateGuide() {
        if (currentTurn < scenario.length) {
            inputField.placeholder = `입력: ${scenario[currentTurn].guide}`;
            inputField.value = "";
        } else {
            inputField.placeholder = "실험 종료";
            inputField.disabled = true;
            sendBtn.disabled = true;
        }
    }

    // 메시지 화면 추가
    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // 전송 로직
    function handleSend() {
        const userInput = inputField.value.trim();
        const target = scenario[currentTurn].guide;

        // 에러 처리: 정확한 입력 확인
        if (userInput !== target) {
            errorMsg.style.display = 'block';
            inputField.style.borderColor = '#ff3b30';
            return;
        }

        // 정상 입력 시
        errorMsg.style.display = 'none';
        inputField.style.borderColor = '#ccc';
        
        appendMessage(userInput, 'user');

        // 시스템 응답 (0.5초 후)
        setTimeout(() => {
            appendMessage(scenario[currentTurn].response, 'system');
            currentTurn++;
            updateGuide();
        }, 500);
    }

    // 이벤트 리스너 등록
    startBtn.addEventListener('click', startExperiment);
    sendBtn.addEventListener('click', handleSend);
    inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter' && !inputField.disabled) handleSend(); });
</script>

</body>
</html>
